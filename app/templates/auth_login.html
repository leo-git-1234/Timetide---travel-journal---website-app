<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Timetide</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .auth-container { min-height: 100vh; display: grid; place-items: center; padding: 4rem 1rem; }
    .auth-card { width: 100%; max-width: 420px; background: var(--surface, #f7f7f5); border-radius: 16px; padding: 28px; box-shadow: var(--shadow-soft, 0 8px 24px rgba(0,0,0,0.06)); border: 1px solid var(--border, rgba(0,0,0,0.08)); }
    .auth-title { font-family: var(--font-serif, 'Playfair Display', Georgia, serif); font-size: 1.75rem; margin: 0 0 8px; color: var(--text-strong, #1d1d1b); }
    .auth-sub { margin: 0 0 24px; color: var(--text-muted, #5c5a57); font-size: 0.975rem; }
    .form-field { display: grid; gap: 6px; margin-bottom: 16px; }
    .form-field label { color: var(--text-muted, #5c5a57); font-size: 0.9rem; }
    .form-input { appearance: none; width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border, rgba(0,0,0,0.12)); background: var(--surface-raised, #fffefd); color: var(--text, #2b2a28); outline: none; transition: border-color .2s ease, box-shadow .2s ease; }
    .form-input:focus { border-color: var(--accent, #7aa693); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, #7aa693) 20%, transparent); }
    .btn-primary { width: 100%; padding: 12px 14px; border-radius: 12px; background: var(--accent, #7aa693); color: #0e140f; border: none; font-weight: 600; cursor: pointer; transition: transform .15s ease, filter .2s ease; }
    .btn-primary:hover { filter: brightness(0.98); transform: translateY(-1px); }
    .form-help { margin-top: 10px; font-size: 0.95rem; color: var(--text-muted, #5c5a57); }
    .form-help a { color: var(--text, #2b2a28); text-underline-offset: 3px; }
    .error-box { display: none; margin-bottom: 14px; padding: 10px 12px; border-radius: 10px; border: 1px solid color-mix(in srgb, #b84444 24%, transparent); background: color-mix(in srgb, #b84444 12%, #fff 88%); color: #6e2a2a; }
  </style>
</head>
<body>
  <main class="auth-container">
    <section class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue your journey.</p>

      <div id="error" class="error-box" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button class="btn-primary" type="submit">Sign in</button>
        <p class="form-help">New to Timetide? <a href="/signup">Create an account</a>.</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }

      try {
        const body = new URLSearchParams({ username: email, password });
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body
        });
        
        // Parse response
        let data = {};
        try {
          data = await res.json();
        } catch (parseErr) {
          // Response was not JSON
          data = {};
        }
        
        if (!res.ok) {
          // Check for specific error statuses
          if (res.status === 401) {
            showError('Incorrect email or password.');
          } else if (data.detail) {
            showError(data.detail);
          } else {
            showError('Sign in failed. Please check your credentials.');
          }
          return;
        }
        
        const token = data && data.access_token;
        if (!token) { showError('Missing token from server.'); return; }
        // Store token as a cookie so it's sent automatically on subsequent requests
        document.cookie = `timetide_token=${token}; path=/; SameSite=Lax; max-age=2592000`;
        console.log('Token stored in cookie:', document.cookie);
        // Small delay to ensure cookie is set before redirect
        setTimeout(() => {
          window.location.assign('/dashboard');
        }, 100);
      } catch (err) {
        console.error('Login error:', err);
        showError('Network connection error. Please check your internet and try again.');
      }
    });
  </script>
</body>
</html>
