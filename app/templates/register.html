{% extends "base.html" %}

{% block title %}Create Account - Timetide{% endblock %}

{% block content %}
<div class="container-narrow" style="max-width: 500px; margin-top: 4rem;">
    <div class="text-center mb-4">
        <h1 style="font-family: var(--font-serif); font-size: 2.5rem;">Begin Your Journey</h1>
        <p class="text-muted">Create an account to start preserving memories</p>
    </div>
    
    <form id="registerForm" style="background: white; padding: 2rem; border: 1px solid var(--border); border-radius: 4px;">
        <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" required minlength="8">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        
        <div class="text-center mt-3">
            <p class="text-muted">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = {
        name: document.getElementById('name').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Store token and redirect
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            alert(data.detail || 'Registration failed');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('An error occurred during registration');
    }
});
</script>
{% endblock %}
