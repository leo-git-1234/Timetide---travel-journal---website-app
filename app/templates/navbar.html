<nav class="navbar">
    <div class="navbar-container">
        <!-- Top Row: Logo Centered, Profile on Right -->
        <div class="navbar-top">
            <a href="/" class="navbar-brand" aria-label="Timetide home">
                <img
                    src="{{ url_for('static', path='/images/timetide-logo.svg') }}?v=2"
                    alt="Timetide logo"
                    class="navbar-logo-image"
                >
            </a>
            
            <div class="navbar-right">
                {% if current_user %}
                <div class="profile-dropdown" id="profileDropdown" onclick="toggleProfileDropdown(event)">
                    <div class="profile-avatar" title="{{ current_user.name }}" id="navbarProfileAvatar">
                        {% if current_user.avatar_url %}
                            <img src="{{ current_user.avatar_url }}" alt="{{ current_user.name }}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        {% else %}
                            {{ current_user.name[0]|upper }}
                        {% endif %}
                    </div>
                    <div class="dropdown-content" id="dropdownContent">
                        <div class="dropdown-header">
                            <div class="dropdown-user-name">{{ current_user.name }}</div>
                            <div class="dropdown-user-email">{{ current_user.email }}</div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/profile" class="dropdown-link">Profile</a>
                        <a href="/settings" class="dropdown-link">Settings</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout(); return false;" class="dropdown-link logout-link">Sign Out</a>
                    </div>
                </div>
                {% else %}
                <div class="auth-buttons">
                    <a href="/login" class="btn-nav btn-nav-secondary">Sign In</a>
                    <a href="/signup" class="btn-nav btn-nav-primary">Sign Up</a>
                </div>
                {% endif %}
            </div>
        </div>
        
        <!-- Bottom Row: Centered Navigation Links (only for authenticated users) -->
        {% if current_user %}
        <div class="navbar-center">
            <a href="/dashboard" class="navbar-link {% if active_page == 'dashboard' %}active{% endif %}">Home</a>
            <a href="/my-trips" class="navbar-link {% if active_page == 'my-trips' %}active{% endif %}">My Trips</a>
            <a href="/explore" class="navbar-link {% if active_page == 'explore' %}active{% endif %}">Explore</a>
            <a href="/calendar" class="navbar-link {% if active_page == 'calendar' %}active{% endif %}">Calendar</a>
        </div>
        {% endif %}
    </div>
</nav>

<script>
    function logout() {
        // Clear all stored authentication tokens
        sessionStorage.removeItem('timetide_token');
        localStorage.removeItem('access_token');
        sessionStorage.removeItem('access_token');
        localStorage.removeItem('timetide_token');
        
        // Redirect to login page
        window.location.href = '/login';
    }

    function toggleProfileDropdown(event) {
        event.stopPropagation();
        const content = document.getElementById('dropdownContent');
        const isOpen = content.classList.contains('open');
        
        if (isOpen) {
            content.classList.remove('open');
        } else {
            content.classList.add('open');
        }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
        const dropdown = document.getElementById('profileDropdown');
        const content = document.getElementById('dropdownContent');
        
        if (dropdown && content) {
            // If clicking outside the dropdown, close it
            if (!dropdown.contains(event.target)) {
                content.classList.remove('open');
            }
        }
    });

    // Prevent dropdown from closing when clicking links inside it
    document.addEventListener('DOMContentLoaded', function() {
        const dropdownContent = document.getElementById('dropdownContent');
        if (dropdownContent) {
            dropdownContent.addEventListener('click', function(event) {
                // Only close on actual links
                if (event.target.tagName === 'A') {
                    document.getElementById('dropdownContent').classList.remove('open');
                }
                event.stopPropagation();
            });
        }
    });
</script>

<style>
    .dropdown-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0.5rem;
    }

    .dropdown-user-name {
        font-weight: 600;
        color: var(--text-primary);
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
    }

    .dropdown-user-email {
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .dropdown-divider {
        height: 1px;
        background: var(--border);
        margin: 0.5rem 0;
    }

    .dropdown-link {
        display: block;
        padding: 0.75rem 1rem;
        color: var(--text-primary);
        text-decoration: none;
        transition: var(--transition);
        font-size: 0.95rem;
    }

    .dropdown-link:hover {
        background: var(--surface-alt);
        color: var(--accent);
    }

    .dropdown-link.logout-link {
        color: #c94848;
    }

    .dropdown-link.logout-link:hover {
        background: rgba(201, 72, 72, 0.1);
    }

    .auth-buttons {
        display: flex;
        gap: 0.75rem;
        align-items: center;
    }

    .btn-nav {
        padding: 0.625rem 1.25rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: var(--transition);
        cursor: pointer;
        border: none;
        font-family: var(--font-sans);
    }

    .btn-nav-secondary {
        background: transparent;
        color: var(--text-primary);
        border: 1px solid var(--border);
    }

    .btn-nav-secondary:hover {
        border-color: var(--text-primary);
        background: var(--surface-alt);
    }

    .btn-nav-primary {
        background: var(--accent);
        color: white;
    }

    .btn-nav-primary:hover {
        opacity: 0.9;
    }

    @media (max-width: 768px) {
        .auth-buttons {
            gap: 0.5rem;
        }

        .btn-nav {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .dropdown-content {
            width: 220px;
        }
    }
</style>
