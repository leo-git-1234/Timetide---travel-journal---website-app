{% extends "base.html" %}

{% block title %}Explore - Timetide{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    .explore-container {
        height: calc(100vh - 70px);
        display: flex;
        flex-direction: column;
    }

    .explore-header {
        padding: 2rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
    }

    .explore-title {
        font-family: var(--font-serif);
        font-size: 2rem;
        margin: 0 0 0.5rem 0;
        color: var(--text-primary);
    }

    .explore-subtitle {
        color: var(--text-secondary);
        margin: 0;
    }

    #explore-map {
        flex: 1;
        width: 100%;
    }

    .trip-popup {
        min-width: 200px;
    }

    .trip-popup-title {
        font-family: var(--font-serif);
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 0.5rem 0;
        color: var(--text-primary);
    }

    .trip-popup-dates {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 0.75rem;
    }

    .trip-popup-btn {
        display: inline-block;
        padding: 0.5rem 1rem;
        background: var(--accent);
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 0.9rem;
        transition: all 0.2s ease;
    }

    .trip-popup-btn:hover {
        opacity: 0.9;
    }

    .cluster-icon {
        background: var(--accent);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block content %}
<div class="explore-container">
    <div class="explore-header">
        <h1 class="explore-title">Explore Your Journeys</h1>
        <p class="explore-subtitle">An interactive map of all your travels</p>
    </div>
    <div id="explore-map"></div>
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script>
    let map = null;
    let markerCluster = null;

    async function loadTrips() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const response = await fetch('/trips/', {
                credentials: 'include'
            });

            if (!response.ok) {
                throw new Error('Failed to load trips');
            }

            const trips = await response.json();
            renderMap(trips);
        } catch (error) {
            console.error('Error loading trips:', error);
            alert('Failed to load trips');
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function renderMap(trips) {
        console.log('Rendering explore map with', trips.length, 'trips');
        
        try {
            const mapContainer = document.getElementById('explore-map');
            console.log('Map container:', mapContainer, 'Dimensions:', mapContainer.offsetWidth, 'x', mapContainer.offsetHeight);
            
            // Initialize map centered on world
            map = L.map('explore-map', {
                center: [20, 0],
                zoom: 2,
                zoomControl: true
            });
            
            console.log('Explore map instance created:', map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 18,
                minZoom: 2
            }).addTo(map);

            // Create marker cluster group
            markerCluster = L.markerClusterGroup({
                iconCreateFunction: function(cluster) {
                    const count = cluster.getChildCount();
                    return L.divIcon({
                        html: `<div class="cluster-icon" style="width: ${30 + count}px; height: ${30 + count}px;">${count}</div>`,
                        className: 'custom-cluster',
                        iconSize: L.point(30 + count, 30 + count)
                    });
                }
            });

            const bounds = [];

            // Add markers for each trip
            trips.forEach(trip => {
                // Use a simple geocoding approach: try to extract coordinates from trip location
                // For now, we'll need entries with actual location data
                // Let's fetch full trip details to get entry locations
                fetchTripDetails(trip.id).then(fullTrip => {
                    if (fullTrip.entries && fullTrip.entries.length > 0) {
                        fullTrip.entries.forEach(entry => {
                            if (entry.location && entry.location.latitude && entry.location.longitude) {
                                const lat = parseFloat(entry.location.latitude);
                                const lng = parseFloat(entry.location.longitude);
                                
                                if (!isNaN(lat) && !isNaN(lng)) {
                                    const marker = L.marker([lat, lng]);
                                    
                                    const popupContent = `
                                        <div class="trip-popup">
                                            <div class="trip-popup-title">${trip.title}</div>
                                            <div class="trip-popup-dates">${formatDateRange(trip.start_date, trip.end_date)}</div>
                                            <a href="/trip/${trip.id}" class="trip-popup-btn">View Trip</a>
                                        </div>
                                    `;
                                    
                                    marker.bindPopup(popupContent);
                                    markerCluster.addLayer(marker);
                                    bounds.push([lat, lng]);
                                }
                            }
                        });

                        // Fit bounds if we have markers
                        if (bounds.length > 0) {
                            map.addLayer(markerCluster);
                            map.fitBounds(bounds, { padding: [50, 50] });
                        }
                    }
                });
            });

            // Force resize after a delay
            setTimeout(() => {
                console.log('Invalidating explore map size');
                map.invalidateSize();
            }, 250);
        } catch (error) {
            console.error('Error rendering explore map:', error);
        }
    }

    async function fetchTripDetails(tripId) {
        try {
            const response = await fetch(`/trips/${tripId}`, {
                credentials: 'include'
            });
            return await response.json();
        } catch (error) {
            console.error(`Error loading trip ${tripId}:`, error);
            return null;
        }
    }

    function formatDateRange(start, end) {
        const startDate = new Date(start);
        const endDate = new Date(end);
        const startStr = startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const endStr = endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `${startStr} – ${endStr}`;
    }

    // Load trips on page load
    document.addEventListener('DOMContentLoaded', loadTrips);
</script>
{% endblock %}
