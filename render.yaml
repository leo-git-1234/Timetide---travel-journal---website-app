databases:
  - name: timetide-db
    plan: free
    databaseName: timetide
    user: timetide
    ipAllowList: []

services:
  - type: web
    name: timetide-app
    env: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: timetide-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
